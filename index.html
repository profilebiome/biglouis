<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigLouis - Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colores de las plataformas */
            --gem-space: #4285F4;  /* Apple Music */
            --gem-time: #1DB954;   /* Spotify */
            --gem-reality: #FF0000;/* YouTube */
        }

        /* Reseteo y Tipografía */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
            perspective: 1000px;
            position: relative;
        }

        /* --- FONDO DE VIDEO --- */
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.5); 
            animation: imageIntro 1.5s ease-out forwards;
        }

        @keyframes imageIntro {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Capa oscura para contraste */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        /* ------------------------------------- */

        /* Contenedor Principal */
        .music-card {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            margin: auto; 
        }

        /* --- CABECERA DEL ARTISTA CON BORDE LUMINOSO --- */
        .header-section {
            text-align: center;
            margin-bottom: 35px;
            animation: slideDownFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.3s;
            opacity: 0;
        }

        .album-art {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffffff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 
                        0 0 20px rgba(255, 255, 255, 0.7),
                        0 0 10px rgba(255, 255, 255, 0.5) inset;
            margin-bottom: 20px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .album-art:hover {
            transform: scale(1.08) rotate(5deg);
        }

        /* CONTENEDOR PARA NOMBRE Y VERIFICADO */
        .verified-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px; 
        }

        .verified-icon {
            width: 20px; 
            height: 20px;
        }

        .artist-name {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            text-transform: uppercase;
        }

        @keyframes slideDownFade {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ------------------------------------ */

        /* Lista de Servicios */
        .services-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Fila de Servicio - Efecto Cristal */
        .service-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Stagger de animaciones */
        .service-row:nth-child(1) { animation-delay: 0.5s; }
        .service-row:nth-child(2) { animation-delay: 0.6s; }
        .service-row:nth-child(3) { animation-delay: 0.7s; }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Efecto de Reflejo */
        .service-row::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: skewX(-25deg);
            transition: 0.6s ease-in-out;
            z-index: 1;
            pointer-events: none;
        }

        .service-row:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px var(--gem-color);
            z-index: 10;
        }

        .service-row:hover::before {
            left: 150%;
        }

        .service-info {
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 2;
        }

        .service-logo-container {
            width: 18px;
            height: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .service-logo-container svg {
            width: 100%;
            height: 100%;
            fill: #b3b3b3;
            transition: all 0.4s ease;
        }

        .service-row:hover .service-logo-container svg {
            fill: var(--gem-color);
            filter: drop-shadow(0 0 6px var(--gem-color));
        }

        .service-name {
            font-size: 15px;
            font-weight: 500;
            color: #eeeeee;
        }

        .action-button {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            z-index: 2;
            min-width: 100px;
            text-align: center;
        }

        .service-row:hover .action-button {
            background-color: var(--gem-color);
            border-color: var(--gem-color);
            color: #000000;
            box-shadow: 0 0 15px var(--gem-color);
        }

        /* Responsive */
        @media (min-width: 768px) {
            .artist-name { font-size: 32px; }
            .music-card { max-width: 520px; }
            .verified-icon { width: 24px; height: 24px; }
        }
    </style>
</head>
